<h2>中心直线执行器应如何显示？</h2>
<p class="subtitle">两种方案都沿固定坐标系 z 轴连接两个圆心；动平台可绕 x/y 轴倾转。</p>

<div class="cards">
  <div class="card" data-choice="solid-cylinder" onclick="toggleSelect(this)">
    <div class="card-image" style="padding:18px;background:#f7fafc">
      <svg viewBox="0 0 360 260" width="100%" role="img" aria-label="单一伸缩圆柱示意">
        <ellipse cx="180" cy="220" rx="135" ry="28" fill="#b7c4d6" stroke="#40546d" stroke-width="3"/>
        <line x1="45" y1="220" x2="315" y2="220" stroke="#40546d" stroke-width="10"/>
        <path d="M155 205 L155 92 Q180 68 205 92 L205 205 Z" fill="#668bb8" stroke="#294965" stroke-width="3"/>
        <ellipse cx="180" cy="92" rx="25" ry="10" fill="#8fb0d5" stroke="#294965" stroke-width="3"/>
        <ellipse cx="180" cy="60" rx="82" ry="20" fill="#e0a95b" stroke="#80561f" stroke-width="3" transform="rotate(-8 180 60)"/>
        <line x1="99" y1="71" x2="261" y2="49" stroke="#80561f" stroke-width="9"/>
        <line x1="45" y1="220" x2="99" y2="71" stroke="#d1495b" stroke-width="4"/>
        <line x1="315" y1="220" x2="261" y2="49" stroke="#2a9d8f" stroke-width="4"/>
        <line x1="180" y1="220" x2="180" y2="60" stroke="#264653" stroke-width="2" stroke-dasharray="6 5"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>A. 单一圆柱</h3>
      <p>每帧按圆心距离改变整个圆柱高度。结构最简洁，重点突出机构运动。</p>
    </div>
  </div>

  <div class="card" data-choice="telescopic-actuator" onclick="toggleSelect(this)">
    <div class="card-image" style="padding:18px;background:#f7fafc">
      <svg viewBox="0 0 360 260" width="100%" role="img" aria-label="缸筒加活塞杆示意">
        <ellipse cx="180" cy="220" rx="135" ry="28" fill="#b7c4d6" stroke="#40546d" stroke-width="3"/>
        <line x1="45" y1="220" x2="315" y2="220" stroke="#40546d" stroke-width="10"/>
        <path d="M145 205 L145 135 Q180 113 215 135 L215 205 Z" fill="#4f7098" stroke="#294965" stroke-width="3"/>
        <ellipse cx="180" cy="135" rx="35" ry="12" fill="#7798be" stroke="#294965" stroke-width="3"/>
        <path d="M169 135 L169 66 L191 66 L191 135 Z" fill="#d9e1e8" stroke="#536675" stroke-width="3"/>
        <ellipse cx="180" cy="66" rx="11" ry="5" fill="#f3f6f8" stroke="#536675" stroke-width="3"/>
        <ellipse cx="180" cy="60" rx="82" ry="20" fill="#e0a95b" stroke="#80561f" stroke-width="3" transform="rotate(-8 180 60)"/>
        <line x1="99" y1="71" x2="261" y2="49" stroke="#80561f" stroke-width="9"/>
        <line x1="45" y1="220" x2="99" y2="71" stroke="#d1495b" stroke-width="4"/>
        <line x1="315" y1="220" x2="261" y2="49" stroke="#2a9d8f" stroke-width="4"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>B. 缸筒 + 活塞杆</h3>
      <p>缸筒固定在定平台，活塞杆随 h 伸缩，更接近真实直线执行器。</p>
    </div>
  </div>
</div>

<p style="margin-top:20px"><strong>共同假设：</strong>三根彩色绳分别连接同编号节点；圆盘保留一定厚度，节点可用小球标记。</p>
